<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MSJZ Presentie — Meldingen</title>
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function (OneSignal) {
      await OneSignal.init({ appId: "4022ec84-29c8-493f-a865-f3635303ee03" });

      var params = new URLSearchParams(window.location.search);
      var eid = params.get('eid');
      var statusEl = document.getElementById('status');

      if (!eid) {
        statusEl.textContent = 'Geen medewerker-ID meegegeven. Open deze pagina via de link in het presentiesysteem.';
        return;
      }

      try {
        await OneSignal.login(eid);
        await OneSignal.Notifications.requestPermission();
        if (OneSignal.Notifications.permission) {
          statusEl.textContent = 'Meldingen zijn ingeschakeld. Je kan dit tabblad nu sluiten.';
        } else {
          statusEl.textContent = 'Meldingen zijn niet toegestaan. Zonder toestemming kun je geen "nog actief?"-meldingen ontvangen tijdens overuren.';
        }
      } catch (e) {
        statusEl.textContent = 'Er ging iets mis bij het inschakelen van meldingen. Probeer deze pagina opnieuw te openen.';
      }
    });
  </script>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 60px 24px; background: #F4F1E8; color: #16150F; }
    h1 { font-size: 20px; }
    p { font-size: 15px; color: #444; max-width: 420px; margin: 16px auto 0; line-height: 1.5; }
  </style>
</head>
<body>
  <h1>Ministerie van Jeugdontwikkeling en Sport</h1>
  <p id="status">Meldingen worden ingeschakeld...</p>
</body>
</html>
